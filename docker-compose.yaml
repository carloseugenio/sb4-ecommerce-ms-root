services:
  # Database for Microservice Order Service)
  order-db:
    image: postgres:17-alpine
    container_name: order-service-db
    restart: always
    environment:
      POSTGRES_USER: order_service_admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: order-db
    ports:
      - "5433:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
      # Optional: Uncomment below to run initial SQL scripts automatically
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Database for Microservice Customer Service)
  customer-db:
    image: postgres:17-alpine
    container_name: customer-service-db
    restart: always
    environment:
      POSTGRES_USER: customer_service_admin
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: customer-db
    ports:
      - "5434:5432"
    volumes:
      - customer_db_data:/var/lib/postgresql/data
      # Optional: Uncomment below to run initial SQL scripts automatically
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql
